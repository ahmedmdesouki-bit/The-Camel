<script type="text/babel">
/* Views — compose the design-system primitives. */
const { Card, StatCard, GateList, Badge, StatusPill, Verdict, Tabs } = window.TheCamelDesignSystem_fdd784;

function Table({ headers, rows, empty = "none" }) {
  if (!rows || !rows.length) return <p className="k-empty">{empty}</p>;
  return (
    <table className="k-table">
      <thead><tr>{headers.map((h, i) => <th key={i}>{h}</th>)}</tr></thead>
      <tbody>{rows.map((r, i) => (<tr key={i}>{r.map((c, j) => <td key={j}>{c}</td>)}</tr>))}</tbody>
    </table>
  );
}
const Tick = ({ children }) => <span className="cml-tick">{children}</span>;
const pnlClass = (v) => (String(v).trim().startsWith("−") || String(v).trim().startsWith("-")) ? "cml-down" : "cml-up";

function Overview({ d }) {
  const k = d.kpis;
  return (
    <div className="k-stack">
      <div className="k-kpi-grid">
        <StatCard label="Total value" value={k.total_value} sub={`${k.open_positions} open positions`} />
        <StatCard label="Cash" value={k.cash} sub="paper balance" />
        <StatCard label="Unrealised P&L" value={k.unrealized_pnl} tone="up" sub="mark-to-market" />
        <StatCard label="Realised P&L" value={k.realized_pnl} tone="up" sub="booked on sells" />
        <StatCard label="Cash drag" value={`${k.cash_drag_pct}%`} tone="gold" sub="within range" />
        <StatCard label="Live capital at risk" value="$0.00" tone="green" sub="paper only" />
      </div>
      <Card title="Live-money safety posture"
            badge={<Badge tone="gold">{d.governance.gate_passed}/{d.governance.gate_total} clear</Badge>}
            hint="Honest booleans — each is a real fact, not a self-scored checkbox. Live trading stays blocked until the founder flips a phase flag.">
        <GateList items={d.governance.gate_items} />
      </Card>
    </div>
  );
}
function Portfolio({ d }) {
  const rows = d.positions.map((p) => [
    <Tick>{p.symbol}</Tick>, p.qty, p.avg_cost, p.market_price, p.market_value,
    <span className={`k-fig ${pnlClass(p.unrealized_pnl)}`}>{p.unrealized_pnl}</span>,
    <span className="k-alloc"><span className="k-bar"><span style={{ width: `${p.alloc}%` }} /></span>{p.alloc}%</span>,
  ]);
  return (
    <Card title="Positions" hint="Whole-share, long-only, Sharia-screened book.">
      <Table headers={["Symbol", "Qty", "Avg cost", "Mkt price", "Mkt value", "Unreal. P&L", "Allocation"]}
             rows={rows} empty="no open positions — paper book is flat" />
    </Card>
  );
}
function Decisions({ d }) {
  const erows = d.edge_decisions.map((e) => [
    e.ts, <Tick>{e.symbol}</Tick>, <span className="k-mono-sm">{e.signal}</span>,
    <Verdict allowed={e.allowed} allowLabel="ALLOWED" blockLabel="BLOCKED" />,
    e.reason, <span className="k-fig">{e.hit_rate}</span>, <span className="k-fig">{e.sample}</span>, <span className="k-fig">{e.confidence}</span>,
  ]);
  const grows = d.guardrail.map((g) => [
    g.ts, <Verdict allowed={!g.blocked} allowLabel="allowed" blockLabel="BLOCKED" />,
    <Tick>{g.symbol}</Tick>, g.reason, g.limit_hit ? <code className="k-code">{g.limit_hit}</code> : "",
  ]);
  return (
    <div className="k-stack">
      <Card title="Edge-Proof decisions" badge={<Badge tone="gold">Evidence gate</Badge>}
            hint="No trade proceeds without a passing EdgeReport. These are the verdicts — including the rejections, which are the whole point.">
        <Table headers={["Time", "Symbol", "Signal", "Edge verdict", "Reason", "Hit-rate", "Sample", "Conf."]}
               rows={erows} empty="no Edge-Proof decisions logged yet" />
      </Card>
      <Card title="Guardrail events" badge={<Badge tone="green">Constitution</Badge>}
            hint="Every consequential action runs through the deterministic Constitution. Blocked actions show the exact reason and the limit that fired.">
        <Table headers={["Time", "Decision", "Symbol", "Reason", "Limit hit"]} rows={grows} empty="no guardrail events yet" />
      </Card>
    </div>
  );
}
function Regime({ d }) {
  const r = d.regime;
  const hrows = d.regime_history.map((h) => [h.classified_at, h.regime, <span className="k-fig">{h.confidence}</span>]);
  return (
    <div className="k-stack">
      <Card title="Macro regime">
        <div className="k-regime">
          <div className="cml-eyebrow">Current regime</div>
          <div className="k-regime-val">{r.regime}</div>
          <div className="k-regime-conf">confidence {r.confidence} · classified {r.classified_at}</div>
          <div className="k-chips">{r.signals.map((s, i) => <span className="k-chip" key={i}>{s}</span>)}</div>
        </div>
      </Card>
      <Card title="Regime history">
        <Table headers={["Classified at", "Regime", "Confidence"]} rows={hrows} empty="no history yet" />
      </Card>
    </div>
  );
}
function Sharia({ d }) {
  const rows = d.whitelist.map((w) => [
    <Tick>{w.symbol}</Tick>,
    w.frozen ? <Badge tone="down" dot>{w.status}</Badge> : <Badge tone="up" dot>{w.status}</Badge>,
    w.frozen ? <span className="cml-down k-fig">close-only</span> : <span className="k-faint">tradeable</span>,
  ]);
  return (
    <Card title="Sharia whitelist"
          hint="Only whitelisted, compliant, non-frozen instruments are tradeable. Frozen names are close-only. (Full AAOIFI ratios — debt/30%, liquidity/67%, ≤5% non-compliant revenue.)">
      <Table headers={["Symbol", "Status", "Tradeability"]} rows={rows} empty="whitelist empty" />
    </Card>
  );
}
function Ops({ d }) {
  const runs = d.runs.map((r) => [<span className="k-mono-sm">{r.id}</span>, r.started_at, <Badge tone="neutral">{r.phase}</Badge>, r.outcome]);
  const ledger = d.ledger.map((l) => [l.ts, <span className="k-mono-sm">{l.type}</span>, <Tick>{l.symbol}</Tick>,
    <span className={`k-fig ${pnlClass(l.amount)}`}>{l.amount}</span>, <span className="k-fig">{l.balance_after}</span>]);
  const checks = Object.entries(d.health_checks).map(([k, v]) => [k, <span className="cml-up k-fig">{v}</span>]);
  return (
    <div className="k-stack">
      <Card title="Recent runs"><Table headers={["Run", "Started", "Phase", "Outcome"]} rows={runs} empty="no runs yet" /></Card>
      <Card title="Ledger" badge={<Badge tone="gold">SHA-256 hash-chain</Badge>}>
        <Table headers={["Time", "Type", "Symbol", "Amount", "Balance after"]} rows={ledger} empty="ledger empty" /></Card>
      <Card title="Health checks"><Table headers={["Check", "Result"]} rows={checks} /></Card>
    </div>
  );
}
window.CamelViews = { Overview, Portfolio, Decisions, Regime, Sharia, Ops };
</script>

<script type="text/babel">

const { Badge: _B, StatusPill, Tabs: _T } = window.TheCamelDesignSystem_fdd784;
const NAV = [

  return (
    <div className="k-app">
      <header className="k-header">
        <div className="k-brand">
          <img src="../../assets/emblem.png" alt="" className="k-emblem" />
          <div>

            <div className="k-tag">Read-only operator view · LLM proposes · Math tests · Guardrails decide · Humans approve · Autonomy earned</div>
          </div>
        </div>
        <button className={`k-kill ${halted ? "k-kill--on" : ""}`} onClick={() => setHalted(!halted)}>
          <i data-lucide={halted ? "play" : "octagon-x"}></i>{halted ? "Resume" : "Kill switch"}
        </button>
      </header>
      <div className="k-statusbar">
        <StatusPill status={status}>{halted ? "HALTED" : status}</StatusPill>
        <span className="k-statusmeta">Mode: <b>{d.mode}</b> · {d.governance.phase_label} · Kill switch: <b>{halted ? "HALTED" : "off"}</b> · Issues: none</span>
      </div>
      <div className="k-navwrap"><_T tabs={NAV} active={view} onChange={setView} /></div>
      <main className="k-main">
        {halted && (
          <div className="k-halt-banner">
            <i data-lucide="octagon-x"></i>
            Kill switch engaged — the loop is frozen and no actions will execute until a human resumes.
          </div>
        )}
        {Current ? <Current d={d} /> : null}
      </main>
      <footer className="k-footer">
        Static read-only snapshot · no live fetch · no order entry · paper only. Not financial, legal, or Sharia advice.
      </footer>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
</script>
